{% extends "base.html" %}

{% block title %}Login - Sistema de Metas{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold">Sistema de Metas</h2>
            <p class="text-muted">Faça login para acessar seu painel</p>
        </div>

        <form action="/auth/login" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Nome de Usuário</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Seu usuário" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
                
                {% if erro %}
                <div class="text-danger mt-2 small fw-bold">
                    {{ erro }}
                </div>
                {% endif %}
            </div>
            
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
            </div>
        </form>
        
        <div class="text-center mt-3">
            <small>Ainda não tem uma conta? <a href="/registro" class="text-decoration-none">Cadastre-se</a></small>
        </div>
        
    </div>
</div>
{% endblock %}
